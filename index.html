<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathway — 25 Weeks to TOEFL</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand" data-link="#/dashboard">
        <span class="brand-mark">P</span>
        <span class="brand-name">Pathway</span>
        <span class="brand-sub">25 weeks → TOEFL</span>
      </div>
      <nav class="topnav">
        <a class="nav-link" data-link="#/dashboard">Dashboard</a>
        <a class="nav-link" data-link="#/leitner">Leitner</a>
        <a class="nav-link" data-link="#/plan">Plan</a>
      </nav>
      <div class="topbar-actions">
        <span id="streakBadge" class="streak-badge" title="Daily streak">🔥 0</span>
        <span id="syncStatus" class="sync-badge disconnected" title="Cloud Sync" onclick="Sync.openModal()" style="cursor:pointer">🔗 Not syncing</span>
      </div>
    </header>

    <main id="view"></main>

    <footer class="appfoot">
      <span>Built for daily practice — Speaking · Listening · Reading · Writing</span>
    </footer>
  </div>

  <!-- Modal root -->
  <div id="modalRoot"></div>

  <!-- Vendor: html2pdf bundle (jsPDF + html2canvas) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>


  <!-- Data -->
  <script src="js/data/plan.js"></script>
  <script src="js/data/translations.js"></script>
  <script src="js/data/week1.js"></script>
  <script src="js/data/week1_reading.js"></script>
  <script src="js/data/week1_listening.js"></script>

  <!-- Core -->
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/mcq.js"></script>

  <!-- Views -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/week.js"></script>
  <script src="js/views/day.js"></script>
  <script src="js/views/speaking.js"></script>
  <script src="js/views/imageStory.js"></script>
  <script src="js/views/reading.js"></script>
  <script src="js/views/listening.js"></script>
  <script src="js/views/leitner.js"></script>
  <script src="js/views/placeholder.js"></script>
  <script src="js/views/plan.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>
</body>
</html>
