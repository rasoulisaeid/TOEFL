<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEFL — 25 Weeks Pathway</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand" data-link="#/dashboard">
        <span class="brand-mark">T</span>
        <div class="brand-text">
          <span class="brand-name">TOEFL</span>
        </div>
      </div>
      <nav class="topnav">
        <a class="nav-link" data-link="#/dashboard">
          <span class="nav-icon material-symbols-rounded">home</span><span class="nav-label">Home</span>
        </a>
        <a class="nav-link" data-link="#/leitner">
          <span class="nav-icon material-symbols-rounded">style</span><span class="nav-label">Words</span>
        </a>
        <a class="nav-link" data-link="#/plan">
          <span class="nav-icon material-symbols-rounded">map</span><span class="nav-label">Plan</span>
        </a>
      </nav>
      <div id="vocabReminder"></div>
      <div class="sidebar-foot">
        <button class="nav-link" id="openSettings" style="width:100%; border:none; background:none; padding:10px; margin-bottom:8px; cursor:pointer; color:var(--text-soft); display:flex; align-items:center; gap:12px">
          <span id="aiStatusIcon" class="nav-icon material-symbols-rounded" style="font-size:20px">radio_button_unchecked</span>
          <span class="nav-label" style="font-weight:600">Gemini API</span>
        </button>
        <div class="sidebar-stats">
          <div id="xpBadge" class="xp-badge" title="Total XP Earned">
            <span class="xp-star">⭐</span><span id="xpNum" class="xp-num">0</span> <span class="xp-unit">XP</span>
          </div>
          <div id="streakBadge" class="streak-badge" title="Daily streak">
            <span class="streak-flame">🔥</span><span class="streak-num">0</span>
          </div>
        </div>
      </div>
    </aside>

    <div class="main-shell">
      <main id="view"></main>
      <footer class="appfoot">
        <span>Built for daily practice — Speaking · Listening · Reading · Writing</span>
      </footer>
    </div>

    <!-- Mobile bottom nav -->
    <nav class="bottom-nav">
      <a class="nav-link" data-link="#/dashboard"><span class="nav-icon material-symbols-rounded">home</span><span class="nav-label">Home</span></a>
      <a class="nav-link" data-link="#/leitner"><span class="nav-icon material-symbols-rounded">style</span><span class="nav-label">Words</span></a>
      <a class="nav-link" data-link="#/plan"><span class="nav-icon material-symbols-rounded">map</span><span class="nav-label">Plan</span></a>
    </nav>
  </div>

  <!-- Modal root -->
  <div id="modalRoot"></div>

  <!-- Vendor: html2pdf bundle (jsPDF + html2canvas) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- Data -->
  <script src="js/data/plan.js"></script>
  <script src="js/data/translations.js"></script>
  <script src="js/data/week1.js"></script>
  <script src="js/data/week1_reading.js"></script>
  <script src="js/data/week1_listening.js"></script>
  <script src="js/data/week1_writing.js"></script>

  <!-- Core -->
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/mcq.js"></script>
  <script src="js/gemini.js"></script>

  <!-- Views -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/week.js"></script>
  <script src="js/views/day.js"></script>
  <script src="js/views/speaking.js"></script>
  <script src="js/views/imageStory.js"></script>
  <script src="js/views/reading.js"></script>
  <script src="js/views/listening.js"></script>
  <script src="js/views/writing.js"></script>
  <script src="js/views/leitner.js"></script>
  <script src="js/views/placeholder.js"></script>
  <script src="js/views/plan.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>
</body>
</html>
